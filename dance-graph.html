<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unnoticed Dance · Tool Knowledge Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0f0f14; color: #e8e8ee;
    font-family: -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  #wrap { position: fixed; inset: 0; }
  svg { width: 100%; height: 100%; cursor: grab; display: block; }
  svg.panning { cursor: grabbing; }

  .edge { stroke: #33343f; stroke-width: 1.2; transition: stroke .15s, stroke-width .15s; }
  .edge.flow { stroke: #4a5a6a; stroke-width: 2; stroke-dasharray: 4 3; }
  .edge.avoid { stroke: #5a2f2f; stroke-dasharray: 2 4; }
  .edge.hot { stroke: #ffd24d; stroke-width: 2.4; stroke-dasharray: none; }
  .edge.dim { stroke-opacity: .12; }
  .elabel { fill: #8a8b96; font-size: 9px; pointer-events: none; }
  .elabel.dim { opacity: .1; }

  .node circle { stroke: #0f0f14; stroke-width: 2; cursor: pointer; transition: stroke .15s, stroke-width .15s; }
  .node.sel circle, .node.nbr circle { stroke: #fff; stroke-width: 2.5; }
  .node.dim { opacity: .22; }
  .node text { fill: #e8e8ee; font-size: 11px; pointer-events: none; text-anchor: middle; }
  .node text.sub { fill: #9a9ba6; font-size: 8.5px; }

  #panel { position: fixed; top: 14px; right: 14px; width: 300px; max-width: calc(100vw - 28px);
    background: rgba(22,22,30,.94); border: 1px solid #2a2a35; border-radius: 12px;
    padding: 16px 18px; backdrop-filter: blur(8px); display: none; max-height: calc(100vh - 28px); overflow-y: auto; }
  #panel.on { display: block; }
  #panel .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px;
    color: #0f0f14; font-weight: 600; margin-bottom: 8px; }
  #panel h2 { font-size: 16px; margin-bottom: 2px; line-height: 1.3; }
  #panel .en { font-size: 11px; color: #9a9ba6; margin-bottom: 10px; }
  #panel p { font-size: 12.5px; line-height: 1.65; color: #cdced6; }
  #panel p b { color: #fff; }
  #panel .close { position: absolute; top: 10px; right: 12px; color: #777; cursor: pointer; font-size: 18px; }

  #legend { position: fixed; left: 14px; bottom: 14px; background: rgba(22,22,30,.9);
    border: 1px solid #2a2a35; border-radius: 10px; padding: 11px 13px; font-size: 11px; }
  #legend .row { display: flex; align-items: center; gap: 7px; margin: 4px 0; color: #b8b9c2; }
  #legend .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }

  #title { position: fixed; left: 14px; top: 14px; }
  #title h1 { font-size: 15px; font-weight: 600; }
  #title .s { font-size: 11px; color: #8a8b96; margin-top: 2px; }
  #title a { color: #5fa9d8; text-decoration: none; }
  #hint { position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    font-size: 11px; color: #55565f; pointer-events: none; }
</style>
</head>
<body>
<div id="wrap">
  <svg id="svg"><g id="scene">
    <g id="edges"></g><g id="elabels"></g><g id="nodes"></g>
  </g></svg>
</div>

<div id="title">
  <h1>Unnoticed Dance · Tool Graph</h1>
  <div class="s">Real-Time Identity-Preservation Motion Installation · <a href="/">dashboard</a></div>
</div>

<div id="panel">
  <span class="close" onclick="clearSel()">×</span>
  <span class="tag" id="p-tag"></span>
  <h2 id="p-label"></h2>
  <div class="en" id="p-en"></div>
  <p id="p-detail"></p>
</div>

<div id="legend"></div>
<div id="hint">Click a node for details · drag to move · scroll to zoom · drag background to pan</div>

<script>
// ============ graph data ============
const G = {
  root:  { c: "#ffd24d", name: "Work / Project" },
  stage: { c: "#5fa9d8", name: "Pipeline stage" },
  tool:  { c: "#6ad07f", name: "Tool (chosen)" },
  ip:    { c: "#c58cf0", name: "Core IP" },
  avoid: { c: "#e07a7a", name: "Avoid / don't use" },
  track: { c: "#e8a660", name: "License track" },
};

const NODES = [
  { id: "root", label: "Unnoticed Dance", en: "Identity-preservation motion installation - Tokyo gallery + robotics SDK", group: "root", r: 30,
    detail: "A visitor dances in front of a plain RGB webcam &rarr; 3D pose is extracted &rarr; their <b>identity signature</b> is blended onto a pre-recorded motion library &rarr; a stylized VRM avatar re-expresses &ldquo;you are still you.&rdquo; Solo-buildable, runs on a MacBook, ~5-10s budget per visitor (2D&rarr;3D lifters run at hundreds-thousands of FPS)." },

  // ==== core IP ====
  { id: "ip", label: "Identity signature + zone α-blend", en: "the core IP", group: "ip", r: 22,
    detail: "<b>Your IP; everything else is commodity.</b> Explicit identity embedding + zone-decomposed feature-space temporal α-blend: cheap (matrix ops), deterministic, per-zone controllable - guarantees a frame budget and avoids diffusion variance. Publishable at SIGGRAPH Asia / CHI / Ars Electronica, portable to the robotics SDK." },
  { id: "transmomo", label: "TransMoMo", en: "CVPR 2020 · motion/structure/view disentangle", group: "tool", r: 13,
    detail: "Unsupervised invariance losses disentangle <b>motion / structure / view</b> - the canonical template for a body-structure-invariant signature. 2D-video-centric, 2020 - conceptual scaffold, not drop-in. Code open." },
  { id: "idpres", label: "IDPres", en: "IEEE TIFS 2024 · skeleton identity augmentation", group: "tool", r: 13,
    detail: "Skeleton-based; explicitly folds in a target's <b>individualized motion + skeleton info</b> to strengthen identity. Published method, reimplement. Validate signature stability (does a few seconds yield a recognizable signature) with its evaluation." },
  { id: "puzzle", label: "Motion Puzzle", en: "ACM TOG 2022 · per-body-part style", group: "tool", r: 13,
    detail: "<b>Per-body-part (zone)</b> style transfer, proving zone-wise style control preserves content - the closest reference to your zone-decomposition. Code available." },

  // ==== stage 1 capture ====
  { id: "s-cap", label: "① Capture", en: "Capture", group: "stage", r: 17,
    detail: "Never the bottleneck. Control gallery lighting, fix the camera, lock exposure (MediaPipe degrades in low light / occlusion). Artistic re-expression needs no metric depth - monocular RGB suffices." },
  { id: "webcam", label: "RGB webcam", en: "1080p60 · primary", group: "tool", r: 12,
    detail: "A 1080p60 webcam, hardware only. Feeding BlazePose is enough for an artistic re-expression." },
  { id: "iphone", label: "iPhone 12 Pro+", en: "LightBuzz SDK · optional depth", group: "tool", r: 11,
    detail: "For depth: iPhone LiDAR + LightBuzz SDK (commercial) gives 2D+3D joints. Reserve depth for the robotics SDK track; the gallery loop doesn't need it." },

  // ==== stage 2 pose ====
  { id: "s-pose", label: "② Pose / 3D lifting", en: "Pose & 2D→3D Lifting", group: "stage", r: 17,
    detail: "A two-stage pipeline is fastest and Mac-friendly. Lifters run <b>117-9341 FPS</b> (RTX 4080, Scientific Reports 2025) because they consume compact 2D keypoints, not images. Export ONNX; run inference in Python and stream joints." },
  { id: "mediapipe", label: "MediaPipe BlazePose", en: "GHUM Holistic · 2D+rough 3D", group: "tool", r: 12,
    detail: "Emits 3D keypoints in real time (~15 FPS mobile, far faster on desktop). Apache-2.0. Assumes front-facing capture; needs a one-time T-pose calibration." },
  { id: "agformer", label: "MotionAGFormer", en: "Apache-2.0 · productization pick", group: "tool", r: 12,
    detail: "Matches MotionBERT accuracy at <b>~half the compute</b> - better for a MacBook; Apache-2.0 is the safer productization choice. Use S/XS or a causal window to protect latency." },
  { id: "motionbert", label: "MotionBERT", en: "research/CC-BY-NC · top accuracy", group: "tool", r: 12,
    detail: "Best-in-class accuracy (42.5M params, 174.7 GFLOPs) but heavier and <b>non-commercial</b> → limits the SDK track. Lite's 243-frame window adds buffering delay; measure end-to-end early." },

  // ==== stage 3 signature ====
  { id: "s-sig", label: "③ Identity signature", en: "Identity Signature", group: "stage", r: 17,
    detail: "Your own explicit contrastive/disentangled embedding, grounded in TransMoMo + IDPres, decoded per zone à la Motion Puzzle. Needs a few seconds of varied visitor motion for a stable signature." },

  // ==== stage 4 target ====
  { id: "s-src", label: "④ Target motion library", en: "Target Motion Library", group: "stage", r: 17,
    detail: "No text prompt + hard latency budget → must be a <b>pre-recorded clip library</b>. Variety via curating dozens of clips selected on the visitor's own motion features, plus offline pre-baked stylized variants (MCM-LDM) so the live path only runs your fast α-blend." },
  { id: "mixamo", label: "Mixamo", en: "Adobe · commercial-safe · primary lib", group: "tool", r: 12,
    detail: "Free, usable in commercial products (Adobe terms) - <b>the gallery AND SDK library</b>, and the bridge to the SDK." },
  { id: "amass", label: "AMASS / HumanML3D", en: "non-commercial only · research track", group: "tool", r: 12,
    detail: "License is <b>non-commercial</b> research/education/art only, and bars training methods for commercial use. A gallery piece may qualify as a &ldquo;non-commercial artistic project,&rdquo; but the SDK does not - keep it to the research/paper track." },
  { id: "momask", label: "MoMask", en: "CVPR 2024 · text→motion · offline pre-bake", group: "tool", r: 12,
    detail: "Masked modeling + residual VQ-VAE text-to-motion; the code base of your Phase 2 (Semantic Spectrum + zone blend). Needs a text prompt + diffusion-class compute → <b>offline only (RunPod A100) to pre-bake a stylized library, never the live 5-10s loop.</b> Trains on HumanML3D → inherits AMASS non-commercial → gallery/paper track." },
  { id: "aist", label: "AIST++", en: "dance dataset · SMPL · genre-labeled", group: "tool", r: 12,
    detail: "Genre-labeled SMPL motion dataset - the library source and matching basis for &ldquo;dance genre matched to the body's characteristics.&rdquo; SMPL .pkl → export to HumanML3D 22 joints. Underlying AIST video DB is non-commercial → research/gallery track." },

  // ==== stage 5 blend ====
  { id: "s-blend", label: "⑤ Identity application / blend", en: "Identity Application / Blending", group: "stage", r: 17,
    detail: "Your zone-decomposed temporal α-blend is the core. Zone-boundary discontinuities → temporal-α smoothing + a <b>1€ filter</b> on output joints to cut jitter." },
  { id: "styleerd", label: "Style-ERD", en: "CVPR 2022 · online streaming baseline", group: "tool", r: 11,
    detail: "Encoder-Recurrent-Decoder, a proven <b>online/streaming</b> baseline that beats offline methods on runtime. Real-time fallback and comparison baseline." },
  { id: "diffusion", label: "MCM-LDM / LILAC", en: "offline pre-bake · v2 frontier", group: "tool", r: 11,
    detail: "MCM-LDM (CVPR 2024) is the strongest offline arbitrary-style-transfer baseline; LILAC (2025) extends it to streaming via sliding windows. <b>Offline pre-bake only</b> - not the live path." },

  // ==== stage 6 retarget ====
  { id: "s-retarget", label: "⑥ Retarget", en: "Retargeting", group: "stage", r: 17,
    detail: "Unity Mecanim maps any Humanoid skeleton via normalized <b>Muscle Space</b> - proportion differences handled in real time, no extra deps. Gotchas: foot-skating (enable Foot IK), VRoid A-pose (enforce T-pose), verify shoulder/2-bone-spine, handle SMPL root translation separately." },
  { id: "mecanim", label: "Unity Mecanim", en: "built-in · muscle-space retarget", group: "tool", r: 12,
    detail: "The same mechanism standard MediaPipe→Unity avatar repos rely on. Learned retargeting (ReConForM/MoReFlow) is v2 - mostly CUDA, not Apple Silicon." },

  // ==== stage 7 unity ====
  { id: "s-unity", label: "⑦ Unity integration / stream", en: "Streaming to Unity", group: "stage", r: 17,
    detail: "Keep Python (GPU inference) and Unity (render) as <b>separate processes</b>; the OSC/VMC bridge decouples them so you can swap the render machine (MacBook) independently of the GPU box (RunPod A100). Localhost UDP is sub-ms; latency is model-bound." },
  { id: "vmc", label: "VMC Protocol", en: "python-osc → EVMC4U + uOSC", group: "tool", r: 12,
    detail: "OSC-based and open - write your own sender (no paid Virtual Motion Capture needed). Python sends HumanBodyBones data to UDP 39539 → EVMC4U ExternalReceiver applies it to the VRM. All MIT, pure C#, runs on macOS." },

  // ==== stage 8 avatar ====
  { id: "s-avatar", label: "⑧ Avatar", en: "Avatar & Aesthetics", group: "stage", r: 17,
    detail: "Pick a <b>neutral-silhouette</b> avatar so motion carries identity - the thesis is &ldquo;you are still you,&rdquo; so don't let an exaggerated preset override the signature. Lock camera/lighting + post (bloom / subtle DOF / grade) for a gallery frame; consider split-screen (raw vs re-expressed)." },
  { id: "vroid", label: "VRoid → VRM", en: "free · Mecanim bones + ARKit", group: "tool", r: 12,
    detail: "VRoid Studio is free; VRM ships with Mecanim humanoid bones + ~52 ARKit blendshapes and intentional stylized characters (not skeletons, not photoreal). Imported via UniVRM (MIT)." },
  { id: "toon", label: "Unity Toon Shader", en: "official free · NPR cel shading", group: "tool", r: 11,
    detail: "Official, free, all pipelines (needs URP/HDRP). 2-step shade ramp + HDR rim light + outline = a deliberate illustrative look that reads as art, not a tech demo." },

  // ==== avoid ====
  { id: "a-realsense", label: "RealSense LiDAR", en: "EOL · last order 2022-02-28", group: "avoid", r: 12,
    detail: "Intel end-of-lifed L515 LiDAR / T265 tracking / RealSense ID face lines; only D4xx stereo remains. <b>Building a months-long installation on it is a supply/support liability.</b> Robotics-grade RGB-D → Orbbec Gemini instead." },
  { id: "a-rpm", label: "Ready Player Me", en: "services down from 2026-01-31", group: "avoid", r: 12,
    detail: "Official forum notice: services unavailable from 2026-01-31 (after Netflix's 2025-12-19 acquisition). <b>Don't build the avatar layer on it.</b>" },
  { id: "a-wham", label: "WHAM live", en: "online ~9 FPS", group: "avoid", r: 11,
    detail: "World-grounded SMPL; core net 200 FPS but ~9 FPS online with pre-processing (A100) - rules out the per-visitor gallery loop. Keep it for the world-grounded SDK/robotics track." },
  { id: "a-livediff", label: "Diffusion live", en: "MCM-LDM/SMooDi/MotionDiffuse", group: "avoid", r: 11,
    detail: "All offline arbitrary-style transfer, can't hit the 5-10s budget, unproven on a MacBook. <b>Don't promise live diffusion in the gallery</b> - offline pre-bake only." },
  { id: "a-barracuda", label: "Barracuda", en: "deprecated → use Sentis", group: "avoid", r: 10,
    detail: "Unity: Barracuda is replaced by Sentis (2.1.x). For in-engine inference use Sentis and validate throughput early, else prefer Python-side inference." },

  // ==== tracks ====
  { id: "t-gallery", label: "Gallery / paper track", en: "Gallery + Publication", group: "track", r: 16,
    detail: "May use Mixamo + AMASS/HumanML3D (as a &ldquo;non-commercial artistic project&rdquo;) + MotionBERT. Publish: SIGGRAPH Asia / CHI / Ars Electronica." },
  { id: "t-sdk", label: "SDK product track", en: "Robotics SDK Product", group: "track", r: 16,
    detail: "Commercial → Mixamo + MotionAGFormer (Apache-2.0) only; no AMASS, no MotionBERT. Keep the two tracks clean - a real legal fork." },
];

const EDGES = [
  // trunk: work -> IP + stages
  ["root","ip","core",""], ["root","s-cap","",""],
  ["ip","transmomo","anchors",""], ["ip","idpres","anchors",""], ["ip","puzzle","ref",""],
  ["ip","s-sig","implements",""],

  // pipeline order
  ["s-cap","s-pose","flow","→"], ["s-pose","s-sig","flow","→"], ["s-sig","s-src","flow","→"],
  ["s-src","s-blend","flow","→"], ["s-blend","s-retarget","flow","→"],
  ["s-retarget","s-unity","flow","→"], ["s-unity","s-avatar","flow","→"],

  // stage -> tools
  ["s-cap","webcam","",""], ["s-cap","iphone","",""],
  ["s-pose","mediapipe","",""], ["s-pose","agformer","",""], ["s-pose","motionbert","",""],
  ["s-src","mixamo","",""], ["s-src","amass","",""],
  ["s-src","momask","offline gen",""], ["s-src","aist","genre lib",""],
  ["ip","momask","code base",""], ["aist","s-sig","genre match",""],
  ["s-blend","ip","core method",""], ["s-blend","styleerd","fallback",""], ["s-blend","diffusion","offline",""],
  ["s-retarget","mecanim","",""],
  ["s-unity","vmc","",""],
  ["s-avatar","vroid","",""], ["s-avatar","toon","",""],

  // avoid (warnings)
  ["s-cap","a-realsense","avoid","avoid"], ["s-avatar","a-rpm","avoid","avoid"],
  ["s-pose","a-wham","avoid","avoid"], ["s-blend","a-livediff","avoid","avoid"],
  ["s-pose","a-barracuda","avoid","avoid"],

  // track membership
  ["t-sdk","mixamo","only",""], ["t-sdk","agformer","only",""],
  ["t-gallery","amass","ok",""], ["t-gallery","motionbert","ok",""],
  ["t-gallery","momask","ok",""], ["t-gallery","aist","ok",""],
  ["t-sdk","amass","banned","avoid"], ["t-sdk","motionbert","banned","avoid"],
  ["t-sdk","momask","banned","avoid"], ["t-sdk","aist","banned","avoid"],
  ["root","t-gallery","",""], ["root","t-sdk","",""],
];

// ============ force layout ============
const svg = document.getElementById("svg");
const scene = document.getElementById("scene");
const gEdges = document.getElementById("edges");
const gEls = document.getElementById("elabels");
const gNodes = document.getElementById("nodes");

let W = window.innerWidth, H = window.innerHeight;
const nodeById = {};
NODES.forEach((n, i) => {
  const a = (i / NODES.length) * Math.PI * 2;
  n.x = W/2 + Math.cos(a) * 260;
  n.y = H/2 + Math.sin(a) * 220;
  n.vx = 0; n.vy = 0;
  nodeById[n.id] = n;
});

const adj = {};
NODES.forEach(n => adj[n.id] = new Set());
EDGES.forEach(e => { adj[e[0]].add(e[1]); adj[e[1]].add(e[0]); });

const edgeEls = EDGES.map(e => {
  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  let cls = "edge";
  if (e[2] === "flow") cls += " flow";
  if (e[3] === "avoid") cls += " avoid";
  line.setAttribute("class", cls);
  gEdges.appendChild(line);
  let lbl = null;
  const txt = (e[2] && e[2] !== "flow") ? e[2] : "";
  if (txt) {
    lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    lbl.setAttribute("class", "elabel"); lbl.textContent = txt;
    gEls.appendChild(lbl);
  }
  return { e, line, lbl };
});

const nodeEls = NODES.map(n => {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "node"); g.dataset.id = n.id;
  const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  c.setAttribute("r", n.r); c.setAttribute("fill", G[n.group].c);
  g.appendChild(c);
  const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
  t.setAttribute("y", n.r + 13); t.textContent = n.label;
  g.appendChild(t);
  gNodes.appendChild(g);
  return { n, g, c, t };
});

let alpha = 1;
function tick() {
  const REP = 5200, SPRING = 0.035, GRAV = 0.018, DAMP = 0.86;
  for (let i = 0; i < NODES.length; i++) {
    const a = NODES[i];
    for (let j = i+1; j < NODES.length; j++) {
      const b = NODES[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      let d2 = dx*dx + dy*dy; if (d2 < 1) d2 = 1;
      const d = Math.sqrt(d2);
      const f = REP / d2;
      const fx = (dx/d)*f, fy = (dy/d)*f;
      a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
    }
  }
  EDGES.forEach(e => {
    const a = nodeById[e[0]], b = nodeById[e[1]];
    let dx = b.x - a.x, dy = b.y - a.y;
    let d = Math.sqrt(dx*dx + dy*dy) || 1;
    const rest = a.r + b.r + 66;
    const f = (d - rest) * SPRING;
    const fx = (dx/d)*f, fy = (dy/d)*f;
    a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
  });
  NODES.forEach(n => {
    if (n.fixed) return;
    n.vx += (W/2 - n.x) * GRAV * 0.05;
    n.vy += (H/2 - n.y) * GRAV * 0.05;
    n.vx *= DAMP; n.vy *= DAMP;
    n.x += n.vx * alpha; n.y += n.vy * alpha;
  });
  render();
  alpha *= 0.994; if (alpha < 0.05) alpha = 0.05;
  requestAnimationFrame(tick);
}

function render() {
  edgeEls.forEach(({e, line, lbl}) => {
    const a = nodeById[e[0]], b = nodeById[e[1]];
    line.setAttribute("x1", a.x); line.setAttribute("y1", a.y);
    line.setAttribute("x2", b.x); line.setAttribute("y2", b.y);
    if (lbl) { lbl.setAttribute("x", (a.x+b.x)/2); lbl.setAttribute("y", (a.y+b.y)/2 - 2); }
  });
  nodeEls.forEach(({n, g}) => g.setAttribute("transform", `translate(${n.x},${n.y})`));
}

let selId = null;
function selectNode(id) {
  selId = id;
  const n = nodeById[id];
  document.getElementById("panel").classList.add("on");
  const tag = document.getElementById("p-tag");
  tag.textContent = G[n.group].name; tag.style.background = G[n.group].c;
  document.getElementById("p-label").textContent = n.label;
  document.getElementById("p-en").textContent = n.en || "";
  document.getElementById("p-detail").innerHTML = n.detail || "";
  const nb = adj[id];
  nodeEls.forEach(({n:nn, g}) => {
    g.classList.toggle("sel", nn.id === id);
    g.classList.toggle("nbr", nb.has(nn.id));
    g.classList.toggle("dim", nn.id !== id && !nb.has(nn.id));
  });
  edgeEls.forEach(({e, line, lbl}) => {
    const hot = e[0] === id || e[1] === id;
    line.classList.toggle("hot", hot);
    line.classList.toggle("dim", !hot);
    if (lbl) lbl.classList.toggle("dim", !hot);
  });
}
function clearSel() {
  selId = null;
  document.getElementById("panel").classList.remove("on");
  nodeEls.forEach(({g}) => g.classList.remove("sel","nbr","dim"));
  edgeEls.forEach(({line, lbl}) => { line.classList.remove("hot","dim"); if (lbl) lbl.classList.remove("dim"); });
}

let view = { x: 0, y: 0, k: 1 };
function applyView() { scene.setAttribute("transform", `translate(${view.x},${view.y}) scale(${view.k})`); }
function toScene(cx, cy) { return { x: (cx - view.x) / view.k, y: (cy - view.y) / view.k }; }

let drag = null, pan = null, moved = false;
svg.addEventListener("mousedown", ev => {
  const g = ev.target.closest(".node");
  if (g) {
    const n = nodeById[g.dataset.id];
    const p = toScene(ev.clientX, ev.clientY);
    drag = { n, dx: n.x - p.x, dy: n.y - p.y }; n.fixed = true; moved = false;
    alpha = Math.max(alpha, 0.5);
  } else {
    pan = { x: ev.clientX - view.x, y: ev.clientY - view.y }; svg.classList.add("panning"); moved = false;
  }
});
window.addEventListener("mousemove", ev => {
  if (drag) {
    const p = toScene(ev.clientX, ev.clientY);
    drag.n.x = p.x + drag.dx; drag.n.y = p.y + drag.dy; drag.n.vx = 0; drag.n.vy = 0; moved = true;
  } else if (pan) {
    view.x = ev.clientX - pan.x; view.y = ev.clientY - pan.y; applyView(); moved = true;
  }
});
window.addEventListener("mouseup", ev => {
  if (drag) {
    drag.n.fixed = false;
    if (!moved) selectNode(drag.n.id);
    drag = null;
  } else if (pan) {
    if (!moved) { const g = ev.target.closest(".node"); if (!g) clearSel(); }
    pan = null; svg.classList.remove("panning");
  }
});
svg.addEventListener("wheel", ev => {
  ev.preventDefault();
  const s = ev.deltaY < 0 ? 1.12 : 1/1.12;
  const nk = Math.min(3, Math.max(0.3, view.k * s));
  const r = svg.getBoundingClientRect();
  const mx = ev.clientX - r.left, my = ev.clientY - r.top;
  view.x = mx - (mx - view.x) * (nk / view.k);
  view.y = my - (my - view.y) * (nk / view.k);
  view.k = nk; applyView();
}, { passive: false });

window.addEventListener("resize", () => { W = window.innerWidth; H = window.innerHeight; });

const legend = document.getElementById("legend");
Object.values(G).forEach(g => {
  const row = document.createElement("div"); row.className = "row";
  row.innerHTML = `<span class="dot" style="background:${g.c}"></span>${g.name}`;
  legend.appendChild(row);
});

applyView();
tick();
</script>
</body>
</html>
