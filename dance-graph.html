const EDGES = [

// ============ 力导向布局 ============
const svg = document.getElementById("svg");
const scene = document.getElementById("scene");
const gEdges = document.getElementById("edges");
const gEls = document.getElementById("elabels");
const gNodes = document.getElementById("nodes");

let W = window.innerWidth, H = window.innerHeight;
const nodeById = {};
NODES.forEach((n, i) => {
  // 环形初始播撒(确定性,不用随机)
  const a = (i / NODES.length) * Math.PI * 2;
  n.x = W/2 + Math.cos(a) * 260;
  n.y = H/2 + Math.sin(a) * 220;
  n.vx = 0; n.vy = 0;
  nodeById[n.id] = n;
});

// 邻接表
const adj = {};
NODES.forEach(n => adj[n.id] = new Set());
EDGES.forEach(e => { adj[e[0]].add(e[1]); adj[e[1]].add(e[0]); });

// 建 DOM
const edgeEls = EDGES.map(e => {
  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  let cls = "edge";
  if (e[2] === "flow") cls += " flow";
  if (e[3] === "avoid") cls += " avoid";
  line.setAttribute("class", cls);
  gEdges.appendChild(line);
  let lbl = null;
  const txt = (e[2] && e[2] !== "flow") ? e[2] : "";
  if (txt) {
    lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    lbl.setAttribute("class", "elabel"); lbl.textContent = txt;
    gEls.appendChild(lbl);
  }
  return { e, line, lbl };
});

const nodeEls = NODES.map(n => {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "node"); g.dataset.id = n.id;
  const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  c.setAttribute("r", n.r); c.setAttribute("fill", G[n.group].c);
  g.appendChild(c);
  const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
  t.setAttribute("y", n.r + 13); t.textContent = n.label;
  g.appendChild(t);
  gNodes.appendChild(g);
  return { n, g, c, t };
});

// 力模拟
let alpha = 1;
function tick() {
  const REP = 5200, SPRING = 0.035, GRAV = 0.018, DAMP = 0.86;
  // 斥力
  for (let i = 0; i < NODES.length; i++) {
    const a = NODES[i];
    for (let j = i+1; j < NODES.length; j++) {
      const b = NODES[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      let d2 = dx*dx + dy*dy; if (d2 < 1) d2 = 1;
      const d = Math.sqrt(d2);
      const f = REP / d2;
      const fx = (dx/d)*f, fy = (dy/d)*f;
      a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
    }
  }
  // 弹簧
  EDGES.forEach(e => {
    const a = nodeById[e[0]], b = nodeById[e[1]];
    let dx = b.x - a.x, dy = b.y - a.y;
    let d = Math.sqrt(dx*dx + dy*dy) || 1;
    const rest = a.r + b.r + 66;
    const f = (d - rest) * SPRING;
    const fx = (dx/d)*f, fy = (dy/d)*f;
    a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
  });
  // 向心 + 积分
  NODES.forEach(n => {
    if (n.fixed) return;
    n.vx += (W/2 - n.x) * GRAV * 0.05;
    n.vy += (H/2 - n.y) * GRAV * 0.05;
    n.vx *= DAMP; n.vy *= DAMP;
    n.x += n.vx * alpha; n.y += n.vy * alpha;
  });
  render();
  alpha *= 0.994; if (alpha < 0.05) alpha = 0.05;
  requestAnimationFrame(tick);
}

function render() {
  edgeEls.forEach(({e, line, lbl}) => {
    const a = nodeById[e[0]], b = nodeById[e[1]];
    line.setAttribute("x1", a.x); line.setAttribute("y1", a.y);
    line.setAttribute("x2", b.x); line.setAttribute("y2", b.y);
    if (lbl) { lbl.setAttribute("x", (a.x+b.x)/2); lbl.setAttribute("y", (a.y+b.y)/2 - 2); }
  });
  nodeEls.forEach(({n, g}) => g.setAttribute("transform", `translate(${n.x},${n.y})`));
}

// ============ 选择 / 高亮 ============
let selId = null;
function selectNode(id) {
  selId = id;
  const n = nodeById[id];
  document.getElementById("panel").classList.add("on");
  const tag = document.getElementById("p-tag");
  tag.textContent = G[n.group].name; tag.style.background = G[n.group].c;
  document.getElementById("p-label").textContent = n.label;
  document.getElementById("p-en").textContent = n.en || "";
  document.getElementById("p-detail").innerHTML = n.detail || "";
  const nb = adj[id];
  nodeEls.forEach(({n:nn, g}) => {
    g.classList.toggle("sel", nn.id === id);
    g.classList.toggle("nbr", nb.has(nn.id));
    g.classList.toggle("dim", nn.id !== id && !nb.has(nn.id));
  });
  edgeEls.forEach(({e, line, lbl}) => {
    const hot = e[0] === id || e[1] === id;
    line.classList.toggle("hot", hot);
    line.classList.toggle("dim", !hot);
    if (lbl) lbl.classList.toggle("dim", !hot);
  });
}
function clearSel() {
  selId = null;
  document.getElementById("panel").classList.remove("on");
  nodeEls.forEach(({g}) => g.classList.remove("sel","nbr","dim"));
  edgeEls.forEach(({line, lbl}) => { line.classList.remove("hot","dim"); if (lbl) lbl.classList.remove("dim"); });
}

// ============ 交互:拖拽节点 / 平移 / 缩放 ============
let view = { x: 0, y: 0, k: 1 };
function applyView() { scene.setAttribute("transform", `translate(${view.x},${view.y}) scale(${view.k})`); }

function toScene(clientX, clientY) {
  return { x: (clientX - view.x) / view.k, y: (clientY - view.y) / view.k };
}

let drag = null, pan = null, moved = false;
svg.addEventListener("mousedown", ev => {
  const g = ev.target.closest(".node");
  if (g) {
    const n = nodeById[g.dataset.id];
    const p = toScene(ev.clientX, ev.clientY);
    drag = { n, dx: n.x - p.x, dy: n.y - p.y }; n.fixed = true; moved = false;
    alpha = Math.max(alpha, 0.5);
  } else {
    pan = { x: ev.clientX - view.x, y: ev.clientY - view.y }; svg.classList.add("panning"); moved = false;
  }
});
window.addEventListener("mousemove", ev => {
  if (drag) {
    const p = toScene(ev.clientX, ev.clientY);
    drag.n.x = p.x + drag.dx; drag.n.y = p.y + drag.dy; drag.n.vx = 0; drag.n.vy = 0; moved = true;
  } else if (pan) {
    view.x = ev.clientX - pan.x; view.y = ev.clientY - pan.y; applyView(); moved = true;
  }
});
window.addEventListener("mouseup", ev => {
  if (drag) {
    drag.n.fixed = false;
    if (!moved) selectNode(drag.n.id);
    drag = null;
  } else if (pan) {
    if (!moved) { const g = ev.target.closest(".node"); if (!g) clearSel(); }
    pan = null; svg.classList.remove("panning");
  }
});
svg.addEventListener("wheel", ev => {
  ev.preventDefault();
  const s = ev.deltaY < 0 ? 1.12 : 1/1.12;
  const nk = Math.min(3, Math.max(0.3, view.k * s));
  const r = svg.getBoundingClientRect();
  const mx = ev.clientX - r.left, my = ev.clientY - r.top;
  view.x = mx - (mx - view.x) * (nk / view.k);
  view.y = my - (my - view.y) * (nk / view.k);
  view.k = nk; applyView();
}, { passive: false });

window.addEventListener("resize", () => { W = window.innerWidth; H = window.innerHeight; });

// 图例
const legend = document.getElementById("legend");
Object.values(G).forEach(g => {
  const row = document.createElement("div"); row.className = "row";
  row.innerHTML = `<span class="dot" style="background:${g.c}"></span>${g.name}`;
  legend.appendChild(row);
});

applyView();
tick();
</script>
</body>
